<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HSS テスト">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>HSS認定制度 テスト一覧</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #1a5276;
  --primary-light: #2980b9;
  --accent: #27ae60;
  --danger: #c0392b;
  --bg: #f0f4f8;
  --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --card: #ffffff;
  --card-hover: #fafbfc;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --text-muted: #95a5a6;
  --border: #dce4ec;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --font: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
}

[data-theme="dark"] {
  --bg: #1a1a2e;
  --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  --card: #16213e;
  --card-hover: #1a2742;
  --text: #e0e0e0;
  --text-light: #a0a0a0;
  --text-muted: #707070;
  --border: #2a3a5c;
  --shadow: 0 4px 20px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
  --primary: #4a9eda;
  --primary-light: #5dade2;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
  transition: background var(--transition), color var(--transition);
}

.app-bg {
  min-height: 100vh;
  background: var(--bg-gradient);
  padding-bottom: max(40px, env(safe-area-inset-bottom));
}

.app {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px;
  padding-top: max(16px, env(safe-area-inset-top));
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.theme-toggle {
  position: fixed; top: 12px; right: 12px; z-index: 50;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--card); border: 2px solid var(--border);
  box-shadow: var(--shadow-sm); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.theme-toggle:hover { transform: scale(1.1); box-shadow: var(--shadow); }

.lang-selector {
  position: fixed; top: 12px; right: 64px; z-index: 50;
  background: var(--card); border: 2px solid var(--border);
  border-radius: 22px; padding: 4px 10px;
  font-size: 0.82rem; color: var(--text);
  box-shadow: var(--shadow-sm); cursor: pointer;
  font-family: inherit; transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
  appearance: none; -webkit-appearance: none;
  height: 44px; line-height: 36px;
}

.header {
  text-align: center;
  padding: 0 0 24px;
}
.header .logo {
  font-size: 2.5rem;
  margin-bottom: 8px;
}
.header h1 {
  font-size: 1.3rem;
  color: #fff;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header .subtitle {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.8);
  margin-top: 4px;
}

.quiz-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 14px;
  transition: all var(--transition);
  text-decoration: none;
  color: inherit;
  display: block;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.quiz-card:hover, .quiz-card:active {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
.quiz-card:active {
  transform: translateY(0) scale(0.98);
}

.quiz-card .card-badge {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 12px;
  border-radius: 20px;
  letter-spacing: 0.03em;
  margin-bottom: 10px;
}
.badge-basic { background: rgba(41,128,185,0.12); color: var(--primary-light); }
.badge-advanced { background: rgba(192,57,43,0.12); color: var(--danger); }

.quiz-card h2 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.quiz-card .card-desc {
  font-size: 0.82rem;
  color: var(--text-light);
  margin-bottom: 12px;
  line-height: 1.6;
}

.quiz-card .card-meta {
  display: flex;
  gap: 16px;
  font-size: 0.75rem;
  color: var(--text-muted);
}
.quiz-card .card-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.quiz-card .card-arrow {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.2rem;
  color: var(--text-muted);
  transition: all var(--transition);
}
.quiz-card:hover .card-arrow {
  color: var(--primary-light);
  transform: translateY(-50%) translateX(4px);
}

.footer {
  text-align: center;
  padding: 20px 0 0;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.5);
}

.lang-note {
  text-align: center;
  margin-top: 8px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 8px 12px;
}

@media (max-width: 480px) {
  .app { padding: 12px; }
  .quiz-card { padding: 18px; }
  .quiz-card h2 { font-size: 1rem; }
  .header h1 { font-size: 1.15rem; }
  .header .logo { font-size: 2rem; }
  .lang-selector { right: 60px; font-size: 0.78rem; padding: 3px 8px; height: 40px; line-height: 32px; }
  .theme-toggle { width: 40px; height: 40px; font-size: 1.1rem; }
}

@media (max-width: 360px) {
  .quiz-card { padding: 14px; }
  .quiz-card h2 { font-size: 0.95rem; }
  .lang-selector { right: 54px; font-size: 0.72rem; }
  .theme-toggle { width: 36px; height: 36px; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.4s ease; }
.fade-in-delay { animation: fadeIn 0.4s ease 0.15s both; }
.fade-in-delay2 { animation: fadeIn 0.4s ease 0.3s both; }
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" aria-label="Dark mode">&#9790;</button>
<select class="lang-selector" id="lang-selector" aria-label="Language">
  <option value="ja">🇯🇵 日本語</option>
  <option value="en">🇺🇸 English</option>
  <option value="vi">🇻🇳 Tiếng Việt</option>
  <option value="id">🇮🇩 Bahasa</option>
</select>

<div class="app-bg">
<div class="app">
  <div class="header fade-in">
    <div class="logo">🐷</div>
    <h1 id="page-title">HSS認定制度 テスト一覧</h1>
    <div class="subtitle" id="page-subtitle">株式会社ヒラノ</div>
  </div>

  <a href="quiz30.html" class="quiz-card fade-in-delay" id="card-30">
    <span class="card-badge badge-basic" id="badge-30">基礎レベル</span>
    <h2 id="card-title-30">養豚基礎用語 理解度テスト</h2>
    <div class="card-desc" id="card-desc-30">養豚の基本用語を問う初級テスト。まずはこちらから挑戦してください。</div>
    <div class="card-meta">
      <span id="meta-q-30">📝 30問</span>
      <span id="meta-t-30">⏱ 30分</span>
      <span id="meta-p-30">🎯 70%合格</span>
    </div>
    <span class="card-arrow">→</span>
  </a>

  <a href="quiz50.html" class="quiz-card fade-in-delay2" id="card-50">
    <span class="card-badge badge-advanced" id="badge-50">強化レベル</span>
    <h2 id="card-title-50">養豚基礎 理解度テスト（強化版）</h2>
    <div class="card-desc" id="card-desc-50">より正確な知識を問う強化版テスト。紛らわしい選択肢で実力を試します。</div>
    <div class="card-meta">
      <span id="meta-q-50">📝 50問</span>
      <span id="meta-t-50">⏱ 50分</span>
      <span id="meta-p-50">🎯 70%合格</span>
    </div>
    <span class="card-arrow">→</span>
  </a>

  <div class="lang-note fade-in-delay2" id="lang-note">
    🌐 日本語・English・Tiếng Việt・Bahasa Indonesia 対応
  </div>

  <div class="footer">© 株式会社ヒラノ HSS認定制度</div>
</div>
</div>

<script>
(function() {
"use strict";

var TRANSLATIONS = {
  ja: {
    pageTitle: "HSS認定制度 テスト一覧",
    pageSubtitle: "株式会社ヒラノ",
    badge30: "基礎レベル",
    badge50: "強化レベル",
    cardTitle30: "養豚基礎用語 理解度テスト",
    cardDesc30: "養豚の基本用語を問う初級テスト。まずはこちらから挑戦してください。",
    cardTitle50: "養豚基礎 理解度テスト（強化版）",
    cardDesc50: "より正確な知識を問う強化版テスト。紛らわしい選択肢で実力を試します。",
    metaQ30: "📝 30問", metaT30: "⏱ 30分", metaP30: "🎯 70%合格",
    metaQ50: "📝 50問", metaT50: "⏱ 50分", metaP50: "🎯 70%合格",
    langNote: "🌐 日本語・English・Tiếng Việt・Bahasa Indonesia 対応"
  },
  en: {
    pageTitle: "HSS Certification Tests",
    pageSubtitle: "Hirano Co., Ltd.",
    badge30: "Basic Level",
    badge50: "Advanced Level",
    cardTitle30: "Swine Basic Terminology Test",
    cardDesc30: "A beginner-level test on basic swine terminology. Start here first.",
    cardTitle50: "Swine Basics Comprehension Test (Enhanced)",
    cardDesc50: "An enhanced test with tricky options to challenge your knowledge.",
    metaQ30: "📝 30 Questions", metaT30: "⏱ 30 min", metaP30: "🎯 70% to pass",
    metaQ50: "📝 50 Questions", metaT50: "⏱ 50 min", metaP50: "🎯 70% to pass",
    langNote: "🌐 Available in Japanese, English, Vietnamese & Indonesian"
  },
  vi: {
    pageTitle: "Danh sách Bài thi HSS",
    pageSubtitle: "Công ty Hirano",
    badge30: "Cơ bản",
    badge50: "Nâng cao",
    cardTitle30: "Kiểm tra Thuật ngữ Cơ bản Chăn nuôi Heo",
    cardDesc30: "Bài kiểm tra cơ bản về thuật ngữ chăn nuôi heo. Hãy bắt đầu từ đây.",
    cardTitle50: "Kiểm tra Kiến thức Chăn nuôi Heo (Nâng cao)",
    cardDesc50: "Bài kiểm tra nâng cao với các đáp án dễ nhầm lẫn để thử thách kiến thức.",
    metaQ30: "📝 30 câu", metaT30: "⏱ 30 phút", metaP30: "🎯 Đạt 70%",
    metaQ50: "📝 50 câu", metaT50: "⏱ 50 phút", metaP50: "🎯 Đạt 70%",
    langNote: "🌐 Hỗ trợ Tiếng Nhật, Tiếng Anh, Tiếng Việt & Tiếng Indonesia"
  },
  id: {
    pageTitle: "Daftar Tes Sertifikasi HSS",
    pageSubtitle: "PT Hirano",
    badge30: "Tingkat Dasar",
    badge50: "Tingkat Lanjut",
    cardTitle30: "Tes Istilah Dasar Peternakan Babi",
    cardDesc30: "Tes tingkat pemula tentang istilah dasar peternakan babi. Mulai dari sini.",
    cardTitle50: "Tes Pemahaman Dasar Peternakan Babi (Lanjutan)",
    cardDesc50: "Tes lanjutan dengan opsi rumit untuk menguji pengetahuan Anda.",
    metaQ30: "📝 30 soal", metaT30: "⏱ 30 menit", metaP30: "🎯 Lulus 70%",
    metaQ50: "📝 50 soal", metaT50: "⏱ 50 menit", metaP50: "🎯 Lulus 70%",
    langNote: "🌐 Tersedia dalam Bahasa Jepang, Inggris, Vietnam & Indonesia"
  }
};

var currentLang = localStorage.getItem("hss_lang") || "ja";

function t(key) { return TRANSLATIONS[currentLang][key] || TRANSLATIONS.ja[key] || key; }

function updateUI() {
  document.getElementById("page-title").textContent = t("pageTitle");
  document.getElementById("page-subtitle").textContent = t("pageSubtitle");
  document.getElementById("badge-30").textContent = t("badge30");
  document.getElementById("badge-50").textContent = t("badge50");
  document.getElementById("card-title-30").textContent = t("cardTitle30");
  document.getElementById("card-desc-30").textContent = t("cardDesc30");
  document.getElementById("card-title-50").textContent = t("cardTitle50");
  document.getElementById("card-desc-50").textContent = t("cardDesc50");
  document.getElementById("meta-q-30").textContent = t("metaQ30");
  document.getElementById("meta-t-30").textContent = t("metaT30");
  document.getElementById("meta-p-30").textContent = t("metaP30");
  document.getElementById("meta-q-50").textContent = t("metaQ50");
  document.getElementById("meta-t-50").textContent = t("metaT50");
  document.getElementById("meta-p-50").textContent = t("metaP50");
  document.getElementById("lang-note").textContent = t("langNote");
}

var langSelect = document.getElementById("lang-selector");
langSelect.value = currentLang;
langSelect.addEventListener("change", function() {
  currentLang = this.value;
  localStorage.setItem("hss_lang", currentLang);
  updateUI();
});
updateUI();

// Dark mode
function initTheme() {
  var saved = localStorage.getItem("hss_theme");
  if (saved === "dark") {
    document.documentElement.setAttribute("data-theme", "dark");
    document.getElementById("theme-toggle").textContent = "\u2600";
  }
}
document.getElementById("theme-toggle").addEventListener("click", function() {
  var isDark = document.documentElement.getAttribute("data-theme") === "dark";
  if (isDark) {
    document.documentElement.removeAttribute("data-theme");
    this.textContent = "\u263E";
    localStorage.setItem("hss_theme", "light");
  } else {
    document.documentElement.setAttribute("data-theme", "dark");
    this.textContent = "\u2600";
    localStorage.setItem("hss_theme", "dark");
  }
});
initTheme();

// Register service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function() {});
}

})();
</script>
</body>
</html>
